<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
        }
        main {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>¡Bienvenido!</h1>
    </header>
    
    <main>
        <h2>Mi Primera Página Web</h2>
        <p>Este es un ejemplo sencillo de una página web en HTML.</p>
        
        <h3>Características:</h3>
        <ul>
            <li>Estructura básica de HTML</li>
            <li>Estilos CSS incorporados</li>
            <li>Diseño responsive</li>
        </ul>
        
        <button onclick="alert('¡Hola!')">Haz clic aquí</button>
    </main>
    
    <footer>
        <p>&copy; 2026 Mi Página Web. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
